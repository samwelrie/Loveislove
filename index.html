<!DOCTYPE html>
<html>
<head>
  <title>Love is Love ❤️</title>
</head>

<body>

<h2>Love is Love ❤️</h2>

<!-- ONLINE USERS -->
<div id="onlineUsers"></div>

<!-- CHAT LIST -->
<div id="chatList"></div>

<!-- CHAT BOX -->
<div id="chatBox" style="height:300px; overflow-y:scroll; border:1px solid #ccc;"></div>

<!-- INPUTS -->
<input type="text" id="username" placeholder="Enter your name..." />
<input type="text" id="messageInput" placeholder="Type a message..." />

<button onclick="sendMessage()">Send</button>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDI3_YMcac5FMvr6h2fExFCQ6AIAmpxFg",
  authDomain: "loveislove-666.firebaseapp.com",
  projectId: "loveislove-666",
  storageBucket: "loveislove-666.appspot.com",
  messagingSenderId: "478205315739",
  appId: "1:478205315739:web:54f3bfbac402787539943e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// SAVE USER
window.onload = function() {
    let savedUser = localStorage.getItem("chatUser");
    if (savedUser) {
        document.getElementById("username").value = savedUser;
    }
};

// SET ONLINE
function setUserOnline() {
    let user = localStorage.getItem("chatUser");
    if (user) {
        db.collection("users").doc(user).set({ online: true });
    }
}
setUserOnline();

// SELECT USER
let selectedUser = null;
function selectUser(user) {
    selectedUser = user;
    alert("Chatting with " + user);
}

// SEND MESSAGE
function sendMessage() {
    let input = document.getElementById("messageInput");
    let usernameInput = document.getElementById("username");

    let username = usernameInput.value;

    if (username.trim() !== "") {
        localStorage.setItem("chatUser", username);
    }

    username = localStorage.getItem("chatUser");

    if (!selectedUser) {
        alert("Select a user first");
        return;
    }

    if (input.value.trim() !== "" && username) {

        // MESSAGE
        db.collection("messages").add({
            text: input.value,
            user: username,
            to: selectedUser,
            time: Date.now()
        });

        // CHAT LIST
        db.collection("chats").doc(username + "_" + selectedUser).set({
            lastMessage: input.value,
            users: [username, selectedUser],
            time: Date.now()
        });

        input.value = "";
    }
}

// LOAD MESSAGES (PRIVATE)
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {
    let chatBox = document.getElementById("chatBox");
    let currentUser = localStorage.getItem("chatUser");

    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
        let data = doc.data();

        if (!data.user || !data.to) return;

        if (
            (data.user === currentUser && data.to === selectedUser) ||
            (data.user === selectedUser && data.to === currentUser)
        ) {
            if (data.user === currentUser) {
                chatBox.innerHTML += `
                <div style="text-align:right; margin:5px;">
                    <span style="background:#ff4d88;color:white;padding:10px;border-radius:15px;">
                        ${data.text}
                    </span>
                </div>`;
            } else {
                chatBox.innerHTML += `
                <div style="text-align:left; margin:5px;">
                    <strong>${data.user}</strong><br>
                    <span style="background:#eee;padding:10px;border-radius:15px;">
                        ${data.text}
                    </span>
                </div>`;
            }
        }
    });

    chatBox.scrollTop = chatBox.scrollHeight;
});

// ONLINE USERS
db.collection("users")
.onSnapshot(snapshot => {
    let onlineDiv = document.getElementById("onlineUsers");
    onlineDiv.innerHTML = "<h3>Online Users</h3>";

    snapshot.forEach(doc => {
        if (doc.data().online) {
            onlineDiv.innerHTML += `
            <p onclick="selectUser('${doc.id}')">🟢 ${doc.id}</p>
            `;
        }
    });
});

// CHAT LIST
db.collection("chats")
.orderBy("time", "desc")
.onSnapshot(snapshot => {
    let chatList = document.getElementById("chatList");
    let currentUser = localStorage.getItem("chatUser");

    chatList.innerHTML = "<h3>Chats</h3>";

    snapshot.forEach(doc => {
        let data = doc.data();

        if (data.users.includes(currentUser)) {

            let otherUser = data.users.find(u => u !== currentUser);

            chatList.innerHTML += `
            <div onclick="selectUser('${otherUser}')"
                 style="border-bottom:1px solid #ccc; padding:10px;">
                 
                <strong>${otherUser}</strong><br>
                <small>${data.lastMessage}</small>
            </div>
            `;
        }
    });
});
</script>

</body>
  </html>
