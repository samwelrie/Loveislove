<!DOCTYPE html>
<html>
<head>
  <title>Love is Love</title><style>
body {
    font-family: Arial;
    background-color: #ffe6f0;
    text-align: center;
}

h1 {
    color: #ff4d88;
}

#chatBox {
    background: white;
    border-radius: 10px;
    padding: 10px;
}

input {
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

button {
    background-color: #ff4d88;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
}
</style>
</head>
<body>

<h1>Love is Love ❤️</h1>
<div id="onlineUsers"></div>
<div id="chatBox" style="border:1px solid #ccc; height:200px; overflow:auto; margin-bottom:10px; padding:10px;">
</div>
<input type="text" id="username" placeholder="Enter your name..." />
<input type="text" id="messageInput" placeholder="Type a message..." />
<input type="text" id="messageInput" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script>window.onload = function() {
    let savedUser = localStorage.getItem("chatUser");

    if (savedUser) {
        document.getElementById("username").value = savedUser;
    }
};function sendMessage() {
    let input = document.getElementById("messageInput");
    let username = localStorage.getItem("chatUser");

    if (!selectedUser) {
        alert("Select a user first");
        return;
    }

    if (input.value.trim() !== "") {
        db.collection("messages").add({
            text: input.value,
            user: username,
            to: selectedUser,
            time: Date.now()
        });

        input.value = "";
    }
}
<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDI3_YMcac5FMvr6h2fExFCQ6AIAmpxFg",
  authDomain: "loveislove-666.firebaseapp.com",
  projectId: "loveislove-666",
  storageBucket: "loveislove-666.appspot.com",
  messagingSenderId: "478205315739",
  appId: "1:478205315739:web:54f3bfbac402787539943e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
function setUserOnline() {
    let user = localStorage.getItem("chatUser");

    if (user) {
        db.collection("users").doc(user).set({
            online: true
        });
    }
}

setUserOnline();let selectedUser = null;

function selectUser(user) {
    selectedUser = user;
    alert("Chatting with " + user);
}
// SEND MESSAGE
function sendMessage() {
    let input = document.getElementById("messageInput");
    alert(input.value);
    }

    if (input.value.trim() !== "") {
        db.collection("messages").add({
            text: input.value,
            time: Date.now()
        });

        input.value = "";
    }
}

// LOAD MESSAGES
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {
    let chatBox = document.getElementById("chatBox");
    let currentUser = localStorage.getItem("chatUser");

    chatBox.innerHTML = "";

    snapshot.forEach(doc => {
        let data = doc.data();

        if (
            (data.user === currentUser && data.to === selectedUser) ||
            (data.user === selectedUser && data.to === currentUser)
        ) {
            if (data.user === currentUser) {
                chatBox.innerHTML += `
                <div style="text-align:right;">
                    <span>${data.text}</span>
                </div>`;
            } else {
                chatBox.innerHTML += `
                <div style="text-align:left;">
                    <strong>${data.user}</strong><br>
                    <span>${data.text}</span>
                </div>`;
            }
        }
    });
});
  db.collection("users")
.onSnapshot(snapshot => {
    let onlineDiv = document.getElementById("onlineUsers");
    onlineDiv.innerHTML = "<h3>Online Users</h3>";

    snapshot.forEach(doc => {
        if (doc.data().online) {
            onlineDiv.innerHTML += `
            <p onclick="selectUser('${doc.id}')">🟢 ${doc.id}</p>
            `;
        }
    });
});
</script></script>
</body>
  </html>
